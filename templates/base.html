{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hangarin{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>Hangarin</h1>
                <p>Task & To-Do Manager</p>
            </div>

            <nav class="nav-section">
                <span class="nav-title">Main</span>
                <a href="{% url 'dashboard' %}" class="nav-link active">Dashboard</a>
            </nav>

            <nav class="nav-section">
                <span class="nav-title">Tasks</span>
                <a href="#" class="nav-link">Tasks</a>
                <a href="#" class="nav-link">Sub Tasks</a>
                <a href="#" class="nav-link">Notes</a>
            </nav>

            <nav class="nav-section">
                <span class="nav-title">Reference</span>
                <a href="#" class="nav-link">Categories</a>
                <a href="#" class="nav-link">Priorities</a>
            </nav>

            <nav class="nav-section">
                <span class="nav-title">System</span>
                <a href="/admin/" class="nav-link">Admin Panel</a>
            </nav>

            <div class="sidebar-footer">
                <small>v1.0 • Django</small>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 class="page-title">{% block page_title %}Dashboard{% endblock %}</h2>
                </div>

                <div class="topbar-actions">
                    <button id="themeToggle" class="theme-toggle" type="button">
                        Toggle Theme
                    </button>
                    <a href="/admin/" class="new-task-btn">Admin Panel</a>
                </div>
            </header>

            <section class="content-area">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
